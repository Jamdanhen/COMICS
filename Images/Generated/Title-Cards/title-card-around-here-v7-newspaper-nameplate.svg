<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 135" width="540" height="135" role="img" aria-labelledby="title desc">
  <title id="title">Around Here newspaper nameplate title card</title>
  <desc id="desc">A bold newspaper nameplate title card reading Around Here...</desc>
  <defs>
    <filter id="press" x="-4%" y="-4%" width="108%" height="108%">
      <feTurbulence type="fractalNoise" baseFrequency="1.1" numOctaves="1" seed="33" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.45"/>
    </filter>
    <pattern id="halftone" width="5" height="5" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="0.45" fill="#111" opacity="0.16"/>
    </pattern>
  </defs>
  <g filter="url(#press)">
    <path d="M22 20 H517 L508 111 H32 Z" fill="#fff" stroke="#111" stroke-width="4"/>
    <rect x="35" y="32" width="460" height="66" fill="url(#halftone)" opacity="0.45"/>
    <path d="M39 36 H498 M37 101 H500" fill="none" stroke="#111" stroke-width="5"/>
    <text x="269" y="84" text-anchor="middle"
          font-family="'Times New Roman', Georgia, serif"
          font-size="58" font-weight="900" letter-spacing="-1.5"
          fill="#111">Around Here...</text>
    <path d="M47 53 H100 M438 53 H489 M47 83 H92 M446 83 H489" stroke="#111" stroke-width="2"/>
  </g>
</svg>

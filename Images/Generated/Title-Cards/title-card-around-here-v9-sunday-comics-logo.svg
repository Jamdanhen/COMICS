<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 190" width="560" height="190" role="img" aria-labelledby="title desc">
  <title id="title">Around Here Sunday comics logo</title>
  <desc id="desc">A black and white Sunday comics page title logo reading Around Here...</desc>
  <defs>
    <filter id="slightInk" x="-4%" y="-4%" width="108%" height="108%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="2" seed="91" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.5"/>
    </filter>
  </defs>
  <g filter="url(#slightInk)">
    <text x="28" y="105"

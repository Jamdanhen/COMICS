          fill="#fff" stroke="#111" stroke-width="8" paint-order="stroke fill">Around</text>
    <text x="252" y="148"
          font-family="'Cooper Black', Georgia, 'Times New Roman', serif"
          font-size="72" font-weight="900" letter-spacing="-1.5"
          fill="#fff" stroke="#111" stroke-width="8" paint-order="stroke fill">Here...</text>
    <path d="M37 126 C118 151 230 150 318 135 C388 122 469 121 529 143"

      <path class="thin" d="M23 55 L57 23 M24 23 L57 56"/>
      <path class="thin" d="M18 68 Q40 88 62 68"/>
    </g>
    <g transform="translate(1560,130)">
      <circle class="thin" cx="40" cy="40" r="34"/>
      <path class="thin" d="M23 55 L57 23 M24 23 L57 56"/>
      <path class="thin" d="M18 68 Q40 88 62 68"/>
    </g>
  </g>


<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="2400" viewBox="0 0 2200 2400">
  <defs>
    <style>
      .page { fill: #fffdf7; }
      .ink { fill: none; stroke: #111; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke: #111; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .dash { fill: none; stroke: #111; stroke-width: 3; stroke-dasharray: 12 10; stroke-linecap: round; }
      .fill { fill: #111; }
      .wash { fill: #f4f0e8; stroke: #111; stroke-width: 4; }
      .title { font-family: Impact, "Arial Black", sans-serif; font-size: 88px; letter-spacing: 1px; fill: #111; }
      .subtitle { font-family: "Arial Black", Arial, sans-serif; font-size: 48px; fill: #111; }
      .poster-title { font-family: "Arial Black", Arial, sans-serif; font-size: 31px; fill: #111; }
      .charge { font-family: Arial, sans-serif; font-size: 24px; fill: #111; }
      .small { font-family: Arial, sans-serif; font-size: 21px; fill: #111; }
      .label { font-family: "Arial Black", Arial, sans-serif; font-size: 25px; fill: #111; }
      .stamp { font-family: Impact, "Arial Black", sans-serif; font-size: 66px; fill: #111; letter-spacing: 3px; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="2200" height="2400"/>
  <rect class="ink" x="45" y="45" width="2110" height="2310"/>
